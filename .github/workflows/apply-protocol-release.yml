name: Apply protocol 0.2 release payload

on:
  push:
    branches:
      - agent/protocol-0.2.0-20260721
    paths:
      - .architectonic-release.part-*
      - .github/workflows/apply-protocol-release.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/protocol-0.2.0-20260721
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply release payload
        run: |
          cat .architectonic-release.part-* | base64 --decode > /tmp/architectonic-release.tar.gz
          tar -xzf /tmp/architectonic-release.tar.gz -C .
          rm -f .architectonic-release.part-*
          rm -f .github/workflows/apply-protocol-release.yml
      - name: Validate final source tree
        run: |
          npm test
          npm run check --if-present
          npm run pack:verify --if-present
          npm pack --dry-run
      - name: Commit final release tree
        run: |
          git config user.name "Architectonic Release Agent"
          git config user.email "release-agent@users.noreply.github.com"
          git add -A
          git commit -m "Release Architectonic protocol 0.2.0"
          git push origin HEAD:agent/protocol-0.2.0-20260721
